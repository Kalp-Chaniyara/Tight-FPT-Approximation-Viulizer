<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPT Clustering Algorithms — Interactive Visualization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Literata:ital,wght@0,400;0,500;0,600;1,400&display=swap');

  :root {
    --bg: #0f1117;
    --bg2: #161b27;
    --bg3: #1d2535;
    --surface: #232d3f;
    --border: rgba(100,140,200,0.15);
    --border2: rgba(100,140,200,0.28);
    --text: #e4eaf5;
    --text2: #8fa3c8;
    --text3: #5a7099;
    --accent: #4a9eff;
    --accent2: #2563eb;
    --gold: #f0b429;
    --green: #34d399;
    --coral: #f87171;
    --purple: #a78bfa;
    --teal: #2dd4bf;
    --orange: #fb923c;
    --font-head: 'Literata', Georgia, serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'Literata', Georgia, serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }

  /* ── TOP BAR ── */
  #topbar {
    height: 52px; display: flex; align-items: center; gap: 16px;
    padding: 0 20px; background: var(--bg2);
    border-bottom: 1px solid var(--border2);
    flex-shrink: 0;
  }
  #topbar h1 { font-family: var(--font-head); font-size: 15px; font-weight: 600; letter-spacing: -0.3px; color: var(--text); white-space: nowrap; }
  .alg-tabs { display: flex; gap: 4px; background: var(--bg3); border-radius: 8px; padding: 3px; }
  .alg-tab { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-family: var(--font-mono); cursor: pointer; border: none; background: transparent; color: var(--text2); transition: all .18s; white-space: nowrap; }
  .alg-tab.active { background: var(--accent2); color: #fff; }
  .mode-toggle { display: flex; gap: 4px; background: var(--bg3); border-radius: 8px; padding: 3px; margin-left: auto; }
  .mode-btn { padding: 5px 10px; border-radius: 6px; font-size: 11px; font-family: var(--font-mono); cursor: pointer; border: none; background: transparent; color: var(--text2); transition: all .18s; }
  .mode-btn.active { background: var(--surface); color: var(--accent); }
  .sep { width: 1px; height: 24px; background: var(--border2); }

  /* ── MAIN LAYOUT ── */
  #main { display: flex; height: calc(100vh - 52px); }

  /* ── LEFT PANEL ── */
  #left { width: 280px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  #left-head { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); }
  #left-head .label { font-size: 10px; font-family: var(--font-mono); color: var(--text3); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
  #step-title { font-size: 14px; font-weight: 600; font-family: var(--font-head); color: var(--text); line-height: 1.4; }
  #pseudocode { flex: 1; overflow-y: auto; padding: 12px 14px; font-family: var(--font-mono); font-size: 11.5px; line-height: 1.7; color: var(--text2); }
  .pcode-line { padding: 2px 6px; border-radius: 4px; transition: background .2s, color .2s; cursor: default; }
  .pcode-line.active { background: rgba(74,158,255,0.15); color: var(--accent); }
  .pcode-line.indent1 { padding-left: 22px; }
  .pcode-line.indent2 { padding-left: 38px; }
  .pcode-line.indent3 { padding-left: 54px; }
  .pcode-kw { color: var(--purple); }
  .pcode-fn { color: var(--gold); }
  .pcode-comment { color: var(--text3); font-style: italic; }
  .pcode-num { color: var(--coral); }
  #why-box { border-top: 1px solid var(--border); padding: 12px 14px; }
  #why-box .why-label { font-size: 10px; font-family: var(--font-mono); color: var(--teal); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
  #why-text { font-size: 12px; line-height: 1.6; color: var(--text2); }

  /* ── CENTER CANVAS ── */
  #center { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; position: relative; }
  #canvas-wrap { flex: 1; position: relative; overflow: hidden; }
  #main-canvas { position: absolute; inset: 0; }
  #caption-bar { padding: 10px 20px; background: var(--bg2); border-top: 1px solid var(--border); font-size: 13px; color: var(--text2); line-height: 1.5; min-height: 48px; }
  #caption-bar strong { color: var(--text); font-weight: 500; }

  /* ── CONTROLS ── */
  #controls {
    padding: 10px 20px; background: var(--bg2);
    border-top: 1px solid var(--border2);
    display: flex; align-items: center; gap: 12px;
  }
  .ctrl-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; font-size: 14px; }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(74,158,255,.08); }
  .ctrl-btn.primary { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .ctrl-btn.primary:hover { background: var(--accent); border-color: var(--accent); }
  #scrubber { flex: 1; accent-color: var(--accent); }
  #step-counter { font-family: var(--font-mono); font-size: 12px; color: var(--text2); white-space: nowrap; }
  .speed-select { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); border-radius: 6px; padding: 4px 8px; font-size: 11px; font-family: var(--font-mono); cursor: pointer; }

  /* ── RIGHT PANEL ── */
  #right { width: 240px; flex-shrink: 0; background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  #right-head { padding: 12px 14px 8px; border-bottom: 1px solid var(--border); font-size: 10px; font-family: var(--font-mono); color: var(--text3); text-transform: uppercase; letter-spacing: .8px; }
  #state-content { flex: 1; overflow-y: auto; padding: 10px 12px; }
  .state-group { margin-bottom: 14px; }
  .state-group-title { font-size: 10px; font-family: var(--font-mono); color: var(--text3); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
  .state-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .state-key { color: var(--text2); font-family: var(--font-mono); font-size: 11px; }
  .state-val { color: var(--text); font-family: var(--font-mono); font-size: 11px; font-weight: 500; }
  .state-val.highlight { color: var(--gold); }
  .state-val.good { color: var(--green); }
  .legend { border-top: 1px solid var(--border); padding: 10px 12px; }
  .legend-title { font-size: 10px; font-family: var(--font-mono); color: var(--text3); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 11px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-sq { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .legend-star { font-size: 13px; line-height: 1; flex-shrink: 0; }

  /* ── TOOLTIP ── */
  #tooltip { position: fixed; pointer-events: none; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 12px; font-size: 12px; font-family: var(--font-mono); color: var(--text); max-width: 200px; line-height: 1.5; opacity: 0; transition: opacity .15s; z-index: 100; }
  #tooltip.show { opacity: 1; }
  #tooltip .tt-name { font-weight: 500; color: var(--accent); margin-bottom: 2px; }
  #tooltip .tt-row { color: var(--text2); }
  #tooltip .tt-row span { color: var(--text); }

  /* ── INSTANCE PICKER ── */
  #instance-bar { padding: 6px 20px; background: var(--bg2); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .inst-label { font-size: 11px; font-family: var(--font-mono); color: var(--text3); }
  .inst-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); font-size: 11px; font-family: var(--font-mono); cursor: pointer; transition: all .15s; }
  .inst-btn:hover, .inst-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(74,158,255,.08); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<div id="topbar">
  <h1>FPT Clustering Algorithms</h1>
  <div class="sep"></div>
  <div class="alg-tabs">
    <button class="alg-tab active" onclick="switchAlg(0)">Alg 1 — Min-Norm Cap. k-Clustering</button>
    <button class="alg-tab" onclick="switchAlg(1)">Alg 2 — Top-cn Norm k-Clustering</button>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="switchMode('simple')">Simple</button>
    <button class="mode-btn" onclick="switchMode('technical')">Technical</button>
  </div>
</div>

<div id="main">
  <!-- LEFT: Pseudocode + Step description -->
  <div id="left">
    <div id="left-head">
      <div class="label">Current Step</div>
      <div id="step-title">Loading…</div>
    </div>
    <div id="pseudocode"></div>
    <div id="why-box">
      <div class="why-label">Why this works</div>
      <div id="why-text"></div>
    </div>
  </div>

  <!-- CENTER: Canvas + controls -->
  <div id="center">
    <div id="canvas-wrap">
      <canvas id="main-canvas"></canvas>
    </div>
    <div id="caption-bar" id="caption"></div>
    <div id="instance-bar">
      <span class="inst-label">Instance:</span>
      <button class="inst-btn active" onclick="loadInstance(0)">Demo A — Clustered</button>
      <button class="inst-btn" onclick="loadInstance(1)">Demo B — Spread</button>
      <button class="inst-btn" onclick="loadInstance(2)">Demo C — Mixed</button>
    </div>
    <div id="controls">
      <button class="ctrl-btn" onclick="goFirst()" title="First step">⏮</button>
      <button class="ctrl-btn" onclick="goPrev()" title="Previous step">⏪</button>
      <button class="ctrl-btn primary" id="playbtn" onclick="togglePlay()" title="Play/Pause">▶</button>
      <button class="ctrl-btn" onclick="goNext()" title="Next step">⏩</button>
      <button class="ctrl-btn" onclick="goLast()" title="Last step">⏭</button>
      <input type="range" id="scrubber" min="0" value="0" step="1" oninput="scrub(this.value)">
      <span id="step-counter">0 / 0</span>
      <select class="speed-select" onchange="setSpeed(this.value)">
        <option value="2000">0.5×</option>
        <option value="1200" selected>1×</option>
        <option value="700">1.5×</option>
        <option value="400">2×</option>
      </select>
    </div>
  </div>

  <!-- RIGHT: State + Legend -->
  <div id="right">
    <div id="right-head">Algorithm State</div>
    <div id="state-content"></div>
    <div class="legend">
      <div class="legend-title">Legend</div>
      <div id="legend-items"></div>
    </div>
  </div>
</div>

<div id="tooltip"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// GLOBAL STATE
// ═══════════════════════════════════════════════════════════════════
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;
let currentAlg = 0;    // 0 = cap, 1 = topCN
let currentMode = 'simple';
let currentStep = 0;
let totalSteps = 0;
let playing = false;
let playTimer = null;
let playSpeed = 1200;
let currentInstance = 0;
let animFrame = null;
let animT = 0;
let lastAnimTime = 0;

// ── INSTANCE DATA ──
const INSTANCES = [
  { // Demo A: well-clustered
    clients: [
      {id:0,x:.15,y:.25},{id:1,x:.20,y:.30},{id:2,x:.12,y:.22},{id:3,x:.18,y:.18},
      {id:4,x:.50,y:.20},{id:5,x:.55,y:.25},{id:6,x:.48,y:.28},{id:7,x:.53,y:.15},
      {id:8,x:.20,y:.70},{id:9,x:.15,y:.75},{id:10,x:.25,y:.65},{id:11,x:.22,y:.78},
      {id:12,x:.72,y:.65},{id:13,x:.78,y:.70},{id:14,x:.68,y:.72},{id:15,x:.75,y:.60},
      {id:16,x:.50,y:.75},{id:17,x:.55,y:.80},{id:18,x:.45,y:.72},
    ],
    facilities: [
      {id:0,x:.16,y:.25,cap:5,label:'F0'},{id:1,x:.52,y:.20,cap:4,label:'F1'},
      {id:2,x:.20,y:.72,cap:5,label:'F2'},{id:3,x:.74,y:.67,cap:4,label:'F3'},
      {id:4,x:.50,y:.77,cap:4,label:'F4'},{id:5,x:.38,y:.45,cap:3,label:'F5'},
      {id:6,x:.62,y:.38,cap:3,label:'F6'},
    ],
    k: 4, name: 'Demo A — Clustered'
  },
  { // Demo B: spread
    clients: [
      {id:0,x:.10,y:.10},{id:1,x:.30,y:.15},{id:2,x:.55,y:.10},{id:3,x:.80,y:.12},
      {id:4,x:.10,y:.45},{id:5,x:.45,y:.40},{id:6,x:.75,y:.42},{id:7,x:.20,y:.70},
      {id:8,x:.50,y:.72},{id:9,x:.80,y:.78},{id:10,x:.35,y:.55},{id:11,x:.65,y:.25},
      {id:12,x:.25,y:.30},{id:13,x:.70,y:.55},{id:14,x:.15,y:.85},
    ],
    facilities: [
      {id:0,x:.12,y:.12,cap:4,label:'F0'},{id:1,x:.55,y:.12,cap:4,label:'F1'},
      {id:2,x:.12,y:.50,cap:4,label:'F2'},{id:3,x:.78,y:.42,cap:3,label:'F3'},
      {id:4,x:.50,y:.75,cap:3,label:'F4'},{id:5,x:.35,y:.35,cap:3,label:'F5'},
    ],
    k: 3, name: 'Demo B — Spread'
  },
  { // Demo C: mixed
    clients: [
      {id:0,x:.10,y:.20},{id:1,x:.15,y:.15},{id:2,x:.20,y:.25},
      {id:3,x:.40,y:.15},{id:4,x:.45,y:.22},{id:5,x:.42,y:.08},
      {id:6,x:.70,y:.10},{id:7,x:.75,y:.18},{id:8,x:.72,y:.25},
      {id:9,x:.25,y:.55},{id:10,x:.30,y:.62},{id:11,x:.20,y:.65},
      {id:12,x:.55,y:.55},{id:13,x:.60,y:.62},{id:14,x:.65,y:.50},
      {id:15,x:.80,y:.70},{id:16,x:.85,y:.75},{id:17,x:.78,y:.80},
      {id:18,x:.35,y:.82},{id:19,x:.42,y:.88},{id:20,x:.30,y:.90},
    ],
    facilities: [
      {id:0,x:.14,y:.18,cap:4,label:'F0'},{id:1,x:.44,y:.15,cap:4,label:'F1'},
      {id:2,x:.72,y:.16,cap:3,label:'F2'},{id:3,x:.24,y:.60,cap:4,label:'F3'},
      {id:4,x:.60,y:.58,cap:4,label:'F4'},{id:5,x:.82,y:.74,cap:3,label:'F5'},
      {id:6,x:.38,y:.85,cap:3,label:'F6'},{id:7,x:.50,y:.42,cap:3,label:'F7'},
    ],
    k: 5, name: 'Demo C — Mixed'
  }
];

let inst = INSTANCES[0];

// ═══════════════════════════════════════════════════════════════════
// ALGORITHM 1: Min-Norm Capacitated k-Clustering STEPS
// ═══════════════════════════════════════════════════════════════════
function buildAlg1Steps(inst) {
  const { clients, facilities, k } = inst;
  const n = clients.length;
  const m = facilities.length;

  // Compute distances
  function dist(a, b) {
    return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
  }

  // Assign each client to nearest facility (for demo)
  function assignClients(openFacs) {
    const assign = {};
    clients.forEach(c => {
      let best = null, bd = Infinity;
      openFacs.forEach(f => { const d = dist(c, facilities[f]); if(d<bd){bd=d;best=f;} });
      assign[c.id] = best;
    });
    return assign;
  }

  // Build clusters respecting capacity (greedy)
  function buildClusters(openFacs) {
    const caps = {};
    openFacs.forEach(i => caps[i] = facilities[i].cap);
    const assign = {};
    // Sort clients by dist to nearest open fac
    const sorted = [...clients].sort((a,b) => {
      const da = Math.min(...openFacs.map(f=>dist(a,facilities[f])));
      const db = Math.min(...openFacs.map(f=>dist(b,facilities[f])));
      return da-db;
    });
    sorted.forEach(c => {
      const sortedFacs = [...openFacs].sort((a,b) => dist(c,facilities[a])-dist(c,facilities[b]));
      for(const f of sortedFacs) {
        if(caps[f] > 0) { assign[c.id] = f; caps[f]--; break; }
      }
      if(assign[c.id] === undefined) assign[c.id] = sortedFacs[0];
    });
    return assign;
  }

  // Compute approximate costs
  function computeCost(assign) {
    return clients.reduce((s,c) => s + (assign[c.id]!==undefined ? dist(c, facilities[assign[c.id]]) : 0), 0);
  }

  // Select k "good" facilities by farthest-first traversal
  function selectFacilities(num) {
    const selected = [0];
    while(selected.length < Math.min(num, m)) {
      let best = -1, bd = -Infinity;
      for(let i=0;i<m;i++) {
        if(selected.includes(i)) continue;
        const d = Math.min(...selected.map(s => dist(facilities[i], facilities[s])));
        if(d > bd) { bd=d; best=i; }
      }
      selected.push(best);
    }
    return selected;
  }

  // Representative sampling (pick 1 sample per "region" around a pivot)
  function sampleRepresentatives(pivots) {
    return pivots.map(p => {
      const nearby = clients.filter(c => {
        const dp = dist(c, facilities[p]);
        return dp < 0.3;
      });
      return nearby.length > 0 ? nearby[Math.floor(nearby.length/2)] : null;
    }).filter(Boolean);
  }

  const kOpen = Math.min(k, m);
  const approxFacs = selectFacilities(kOpen+1);
  const finalFacs = selectFacilities(kOpen);
  const approxAssign = assignClients(approxFacs);
  const finalAssign = buildClusters(finalFacs);
  const approxCost = computeCost(approxAssign);
  const finalCost = computeCost(finalAssign);
  const reps = sampleRepresentatives(finalFacs);

  // Color palette for clusters
  const clusterColors = ['#4a9eff','#f0b429','#34d399','#f87171','#a78bfa','#2dd4bf','#fb923c','#ec4899'];

  // ── STEPS DEFINITION ──
  return [
    {
      id: 0,
      title: 'Problem Setup',
      caption: '<strong>Input:</strong> We have a metric space with facilities (squares) and clients (circles). Each facility has a capacity — the max number of clients it can serve. We want to pick k facilities and assign all clients, respecting capacities, minimizing total assignment cost.',
      why: 'The capacitated k-clustering problem requires us to open exactly k facilities and assign every client to an open facility, subject to capacity constraints.',
      whyTech: 'Formally: given metric (X, d), facilities F, clients C, capacities u_f, integer k, find S⊆F, |S|=k and assignment σ:C→S with |σ⁻¹(f)| ≤ u_f, minimizing the norm cost.',
      pseudoLines: [0, 1],
      draw: (ctx, W, H, t) => {
        drawGrid(ctx, W, H);
        facilities.forEach(f => {
          drawFacility(ctx, f, W, H, {color:'#8fa3c8', label: `cap=${f.cap}`, showCap: true});
        });
        clients.forEach(c => drawClient(ctx, c, W, H, {color:'#4a9eff', alpha: 0.6}));
        drawLabel(ctx, W, H, `n=${n} clients  |  m=${m} facilities  |  k=${k}`);
      },
      state: [
        {group:'Input', rows: [{k:'n (clients)',v:n},{k:'m (facilities)',v:m},{k:'k (centers)',v:k}]},
        {group:'Goal', rows: [{k:'Approximation',v:'3+ε'},{k:'Algorithm',v:'FPT'},{k:'Norm',v:'Min-Norm'}]},
      ]
    },
    {
      id: 1,
      title: 'Metric Space & Distances',
      caption: '<strong>Distance computation:</strong> Lines show some pairwise distances between facilities. The algorithm works in any metric space — distances satisfy the triangle inequality. Hover over any point to see distances.',
      why: 'The metric structure is crucial: triangle inequality allows rounding errors to compound predictably, which is how approximation guarantees are proved.',
      whyTech: 'We work in metric (X,d). The cost of assigning client j to facility i is d(j,i). The triangle inequality d(a,c) ≤ d(a,b)+d(b,c) is used in the proof of the approximation ratio.',
      pseudoLines: [1],
      draw: (ctx, W, H, t) => {
        drawGrid(ctx, W, H);
        // Draw some distance lines
        for(let i=0;i<m;i++) for(let j=i+1;j<m;j++) {
          if(Math.random() < 0.35) {
            const fi = facilities[i], fj = facilities[j];
            const d = Math.hypot(fi.x-fj.x, fi.y-fj.y);
            if(d < 0.4) {
              ctx.save();
              ctx.strokeStyle = 'rgba(90,112,153,0.4)';
              ctx.setLineDash([4,4]);
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(fi.x*W, fi.y*H);
              ctx.lineTo(fj.x*W, fj.y*H);
              ctx.stroke();
              ctx.restore();
              const mx = (fi.x+fj.x)/2*W, my = (fi.y+fj.y)/2*H;
              ctx.save();
              ctx.fillStyle = '#5a7099';
              ctx.font = '10px IBM Plex Mono';
              ctx.textAlign = 'center';
              ctx.fillText(d.toFixed(2), mx, my-4);
              ctx.restore();
            }
          }
        }
        facilities.forEach(f => drawFacility(ctx, f, W, H, {color:'#8fa3c8'}));
        clients.forEach(c => drawClient(ctx, c, W, H, {color:'#4a9eff', alpha: 0.5}));
      },

// ALGORITHM 2: Top-cn Norm k-Clustering STEPS
// ═══════════════════════════════════════════════════════════════════
function buildAlg2Steps(inst) {
  const { clients, facilities, k } = inst;
  const n = clients.length;
  const m = facilities.length;

  function dist(a, b) { return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2); }

  const cn = Math.max(1, Math.floor(n * 0.5)); // top cn = top 50%
  const c_param = 0.5;

  // Compute threshold τ: the (cn)-th smallest distance in a candidate assignment
  function computeThreshold(openFacs) {
    const dists = clients.map(cl => Math.min(...openFacs.map(fi => dist(cl, facilities[fi]))));
    dists.sort((a,b)=>a-b);
    return dists[Math.min(cn-1, dists.length-1)] || 0;
  }

  function assignClients(openFacs) {
    return Object.fromEntries(clients.map(c => {
      let best = 0, bd = Infinity;
      openFacs.forEach(fi => { const d = dist(c, facilities[fi]); if(d<bd){bd=d;best=fi;} });
      return [c.id, {fac:best, dist:bd}];
    }));
  }

  function selectFacilitiesFFT(num) {
    const selected = [0];
    while(selected.length < Math.min(num, m)) {
      let best = -1, bd = -Infinity;
      for(let i=0;i<m;i++) {
        if(selected.includes(i)) continue;
        const d = Math.min(...selected.map(s => dist(facilities[i], facilities[s])));
        if(d > bd) { bd=d; best=i; }
      }
      selected.push(best);
    }
    return selected;
  }

  const kOpen = Math.min(k, m);
  const finalFacs = selectFacilitiesFFT(kOpen);
  const allAssign = assignClients(finalFacs);
  const sortedByDist = [...clients].sort((a,b) => allAssign[a.id].dist - allAssign[b.id].dist);
  const topClients = sortedByDist.slice(0, cn); // clients with largest distances are NOT in top cn cost
  const bottomClients = sortedByDist.slice(cn);
  const tau = computeThreshold(finalFacs);

  // Sample clients for guessing
  const sampleSize = Math.min(Math.ceil(k * 2), clients.length);
  const sampledClients = clients.slice(0, sampleSize);

  // Pivots = guessed "threshold witnesses"
  const pivots = finalFacs.slice(0, Math.min(k, finalFacs.length));

  const topCnCost = sortedByDist.slice(0, cn).reduce((s, c) => s + allAssign[c.id].dist, 0);
  const clusterColors = ['#4a9eff','#f0b429','#34d399','#f87171','#a78bfa','#2dd4bf','#fb923c','#ec4899'];

  return [
    {
      id: 0, title: 'Top-cn Norm: Problem Setup',
      caption: '<strong>Top-cn cost:</strong> Unlike min-norm, we only care about the top cn assignment distances (the cn largest ones). The goal is to minimize this "top-cn norm". This is useful when we want the worst-served clients to be as good as possible.',
      why: 'Top-cn norm focuses on the worst-affected cn clients. Minimizing it is like a partial k-median objective — common in fairness-aware clustering.',
      whyTech: 'Given metric (X,d), k, c ∈ (0,1]: minimize Σ_{j ∈ top-cn-clients} d(j, σ(j)) over all k-clustering σ. The parameter c controls what fraction of clients we care about.',
      pseudoLines: [0,1],
      draw: (ctx, W, H, t) => {
        drawGrid(ctx, W, H);
        facilities.forEach(f => drawFacility(ctx, f, W, H, {color:'#8fa3c8', showCap:false}));
        clients.forEach(c => drawClient(ctx, c, W, H, {color:'#4a9eff', alpha:0.6}));
        // Show cn annotation
        ctx.save();
        ctx.fillStyle = hexToRgba('#a78bfa', 0.12);
        ctx.fillRect(W*0.01, H*0.87, W*0.98, H*0.11);
        ctx.fillStyle = '#a78bfa'; ctx.font = '12px IBM Plex Mono';
        ctx.textAlign = 'left';
        ctx.fillText(`Objective: minimize cost of top cn = ${cn} clients  (c = ${c_param})`, W*0.03, H*0.93);
        ctx.restore();
        drawLabel(ctx, W, H, `n=${n} clients  |  c=${c_param}  |  cn = ${cn} worst clients`);
      },
      state: [{group:'Input', rows: [{k:'n',v:n},{k:'c',v:c_param},{k:'cn',v:cn},{k:'k',v:k}]},{group:'Objective', rows: [{k:'Type',v:'Top-cn norm'},{k:'Approx',v:`1+2/(ec)+ε`}]}]
    },
    {
      id: 1, title: 'Compute Top-cn Cost Concept',
      caption: '<strong>Sorted distances:</strong> For a candidate solution, we sort all client assignment distances. The top-cn norm is the sum of the cn largest distances. Points with smaller distance (well-served) are shown faded.',
      why: 'Sorting distances is the key to understanding what we\'re minimizing. The top cn "bad" assignments dominate the objective.',
      whyTech: 'For assignment σ, let D_j = d(j, σ(j)). Sort D in decreasing order: D_(1) ≥ D_(2) ≥ … ≥ D_(n). Top-cn norm = Σ_{j=1}^{cn} D_(j).',
      pseudoLines: [2,3],
      draw: (ctx, W, H, t) => {
        drawGrid(ctx, W, H);
        facilities.forEach(f => drawFacility(ctx, f, W, H, {color:'#8fa3c8', open:false}));
        finalFacs.forEach(fi => drawFacility(ctx, facilities[fi], W, H, {color:'#4a9eff', open:true}));
        sortedByDist.forEach((c, idx) => {
          const inTop = idx >= cn;
          const col = inTop ? '#a78bfa' : '#4a9eff';
          const alpha = inTop ? 0.8 : 0.25;
          if(inTop) {
            const f = facilities[allAssign[c.id].fac];
            ctx.save(); ctx.strokeStyle = hexToRgba('#a78bfa', 0.5); ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.moveTo(c.x*W,c.y*H); ctx.lineTo(f.x*W,f.y*H); ctx.stroke(); ctx.restore();
          }

// DRAWING HELPERS
// ═══════════════════════════════════════════════════════════════════
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawGrid(ctx, W, H) {
  ctx.save();
  ctx.strokeStyle = 'rgba(100,140,200,0.06)';
  ctx.lineWidth = 1;
  for(let x=0; x<=W; x+=W/10) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0; y<=H; y+=H/10) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.restore();
}

function drawFacility(ctx, f, W, H, opts={}) {
  const {color='#8fa3c8', open=false, label='', showCap=false, glow=false} = opts;
  const x = f.x * W, y = f.y * H;
  const sz = 12;
  ctx.save();
  if(glow) {
    ctx.shadowColor = color; ctx.shadowBlur = 12;
  }
  ctx.fillStyle = open ? hexToRgba(color, 0.3) : hexToRgba(color, 0.1);
  ctx.strokeStyle = color;
  ctx.lineWidth = open ? 2 : 1;
  ctx.beginPath();
  ctx.rect(x-sz, y-sz, sz*2, sz*2);
  ctx.fill(); ctx.stroke();
  if(open) {
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.rect(x-4, y-4, 8, 8); ctx.fill();
  }
  ctx.shadowBlur = 0;
  if(label) {
    ctx.fillStyle = color; ctx.font = '10px IBM Plex Mono';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(label, x, y+sz+3);
  }
  if(showCap && f.cap) {
    ctx.fillStyle = hexToRgba(color, 0.8); ctx.font = 'bold 9px IBM Plex Mono';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(`${f.cap}`, x, y-sz-1);
  }
  ctx.restore();
}

function drawClient(ctx, c, W, H, opts={}) {
  const {color='#4a9eff', alpha=0.8, size=5, label=''} = opts;
  const x = c.x*W, y = c.y*H;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.strokeStyle = hexToRgba(color, 0.5);
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.globalAlpha = 1;
  if(label) {
    ctx.fillStyle = color; ctx.font = '9px IBM Plex Mono';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(label, x, y-size-1);
  }
  ctx.restore();
}

function drawStar(ctx, x, y, size, color, alpha=1) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.beginPath();
  for(let i=0;i<5;i++) {
    const a = Math.PI*2*i/5 - Math.PI/2;
    const a2 = a + Math.PI/5;
    if(i===0) ctx.moveTo(x+Math.cos(a)*size, y+Math.sin(a)*size);
    else ctx.lineTo(x+Math.cos(a)*size, y+Math.sin(a)*size);
    ctx.lineTo(x+Math.cos(a2)*size*0.4, y+Math.sin(a2)*size*0.4);
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawLabel(ctx, W, H, text) {
  ctx.save();
  ctx.fillStyle = 'rgba(15,17,23,0.7)';
  const tw = ctx.measureText(text).width + 20;
  roundRect(ctx, W/2-tw/2, H-34, tw, 24, 6);
  ctx.fill();
  ctx.fillStyle = '#8fa3c8'; ctx.font = '11px IBM Plex Mono';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, W/2, H-22);
  ctx.restore();
}

// STEPS & UI MANAGEMENT
// ═══════════════════════════════════════════════════════════════════
let steps = [];
let algPseudo = [];
let algPcodeActive = [];

function buildSteps() {
  if(currentAlg === 0) {
    steps = buildAlg1Steps(inst);
    algPseudo = ALG1_PSEUDO;
    algPcodeActive = ALG1_PCODE_ACTIVE;
  } else {
    steps = buildAlg2Steps(inst);
    algPseudo = ALG2_PSEUDO;
    algPcodeActive = ALG2_PCODE_ACTIVE;
  }
  totalSteps = steps.length;
  document.getElementById('scrubber').max = totalSteps - 1;
  currentStep = 0;
  updateUI();
}

function updateUI() {
  const step = steps[currentStep];
  if(!step) return;

  // Step title
  document.getElementById('step-title').textContent = step.title;

  // Caption
  const captionEl = document.getElementById('caption-bar');
  captionEl.innerHTML = step.caption;

  // Why box
  document.getElementById('why-text').textContent =
    currentMode === 'technical' && step.whyTech ? step.whyTech : step.why;

  // Step counter
  document.getElementById('step-counter').textContent = `${currentStep+1} / ${totalSteps}`;

  // Scrubber
  document.getElementById('scrubber').value = currentStep;

  // Pseudocode
  renderPseudocode(step);

  // State panel
  renderState(step);

  // Legend
  renderLegend();

  // Canvas
  renderCanvas(0);
}

function renderPseudocode(step) {
  const active = algPcodeActive[currentStep] || [];
  const container = document.getElementById('pseudocode');
  container.innerHTML = '';
  algPseudo.forEach(line => {
    const div = document.createElement('div');
    div.className = 'pcode-line' + (line.indent ? ` indent${line.indent}`:'') + (active.includes(line.id) ? ' active':'');
    let text = line.text;
    if(line.type === 'comment') text = `<span class="pcode-comment">${text}</span>`;
    else if(line.type === 'kw') text = text.replace(/\b(for|if|do|return|end|Input|Algorithm)\b/g, m=>`<span class="pcode-kw">${m}</span>`);
    else if(line.type === 'fn') text = `<span class="pcode-fn">${text}</span>`;
    div.innerHTML = text;
    container.appendChild(div);
  });
  // Scroll active into view
  const activeEl = container.querySelector('.active');
  if(activeEl) activeEl.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function renderState(step) {
  const c = document.getElementById('state-content');
  c.innerHTML = '';
  if(!step.state) return;
  step.state.forEach(group => {
    const g = document.createElement('div'); g.className = 'state-group';
    const t = document.createElement('div'); t.className = 'state-group-title'; t.textContent = group.group;
    g.appendChild(t);
    group.rows.forEach(row => {
      const r = document.createElement('div'); r.className = 'state-row';
      const k = document.createElement('span'); k.className = 'state-key'; k.textContent = row.k;
      const v = document.createElement('span'); v.className = 'state-val' + (row.cl ? ` ${row.cl}`:''); v.textContent = row.v;
      r.appendChild(k); r.appendChild(v); g.appendChild(r);
    });
    c.appendChild(g);
  });
}

function renderLegend() {
  const c = document.getElementById('legend-items');
  c.innerHTML = '';
  const items = [
    {type:'sq', color:'#4a9eff', label:'Facility (closed)'},
    {type:'sq-open', color:'#4a9eff', label:'Facility (open)'},
    {type:'dot', color:'#4a9eff', label:'Client'},
    {type:'dot', color:'#f0b429', label:'Representative'},
    {type:'dot', color:'#a78bfa', label:'Top-cn client'},
    {type:'dot', color:'#34d399', label:'Easy client'},
    {type:'dash', color:'#4a9eff', label:'Assignment'},
    {type:'dash', color:'rgba(100,120,160,0.5)', label:'Radius ball'},
  ];
  items.forEach(item => {
    const d = document.createElement('div'); d.className = 'legend-item';
    const icon = document.createElement('div');
    if(item.type === 'dot') { icon.className='legend-dot'; icon.style.background=item.color; }
    else if(item.type === 'sq' || item.type === 'sq-open') { icon.className='legend-sq'; icon.style.background=item.color+'22'; icon.style.border=`1.5px solid ${item.color}`; }
    else if(item.type === 'dash') { icon.style.width='16px'; icon.style.height='1px'; icon.style.borderTop=`2px dashed ${item.color}`; icon.style.marginTop='5px'; }
    d.appendChild(icon);
    const l = document.createElement('span'); l.textContent = item.label;
    d.appendChild(l); c.appendChild(d);
  });
}

// ═══════════════════════════════════════════════════════════════════
// CANVAS RENDERING
// ═══════════════════════════════════════════════════════════════════
function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
}

function renderCanvas(t) {
  const step = steps[currentStep];
  if(!step) return;
  ctx.clearRect(0, 0, W, H);
  step.draw(ctx, W, H, t);
}

function animLoop(timestamp) {
  if(!lastAnimTime) lastAnimTime = timestamp;
  animT += (timestamp - lastAnimTime) * 0.001;
  lastAnimTime = timestamp;
  renderCanvas(animT);
  animFrame = requestAnimationFrame(animLoop);
}

function startAnim() {
  if(animFrame) cancelAnimationFrame(animFrame);
  lastAnimTime = 0;
  animFrame = requestAnimationFrame(animLoop);
}

// ═══════════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════════
function goNext() { if(currentStep < totalSteps-1) { currentStep++; updateUI(); } }
function goPrev() { if(currentStep > 0) { currentStep--; updateUI(); } }
function goFirst() { currentStep = 0; updateUI(); }
function goLast() { currentStep = totalSteps-1; updateUI(); }
function scrub(v) { currentStep = parseInt(v); updateUI(); }
function setSpeed(v) { playSpeed = parseInt(v); if(playing) { clearInterval(playTimer); playTimer = setInterval(stepPlay, playSpeed); } }

function togglePlay() {
  playing = !playing;
  document.getElementById('playbtn').textContent = playing ? '⏸' : '▶';
  if(playing) playTimer = setInterval(stepPlay, playSpeed);
  else clearInterval(playTimer);
}

function stepPlay() {
  if(currentStep >= totalSteps-1) { playing = false; clearInterval(playTimer); document.getElementById('playbtn').textContent='▶'; return; }
  goNext();
}

function switchAlg(i) {
  currentAlg = i;
  document.querySelectorAll('.alg-tab').forEach((b,idx) => b.classList.toggle('active', idx===i));
  buildSteps(); startAnim();
}

function switchMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase()===m));
  updateUI();
}

function loadInstance(i) {
  currentInstance = i;
  inst = INSTANCES[i];
  document.querySelectorAll('.inst-btn').forEach((b,idx) => b.classList.toggle('active', idx===i));
  buildSteps(); startAnim();
}

// ═══════════════════════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════════════════════
const tooltip = document.getElementById('tooltip');
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const nx = mx/W, ny = my/H;
  let found = null;

  inst.facilities.forEach(f => {
    if(Math.abs(f.x-nx)<0.04 && Math.abs(f.y-ny)<0.04) {
      found = {type:'Facility', name:f.label, rows:[
        {k:'cap',v:f.cap},
        {k:'pos',v:`(${f.x.toFixed(2)}, ${f.y.toFixed(2)})`},
      ]};
    }
  });
  if(!found) inst.clients.forEach(c => {
    if(Math.abs(c.x-nx)<0.025 && Math.abs(c.y-ny)<0.025) {
      found = {type:'Client', name:`Client ${c.id}`, rows:[
        {k:'pos',v:`(${c.x.toFixed(2)}, ${c.y.toFixed(2)})`},
      ]};
    }
  });

  if(found) {
    tooltip.innerHTML = `<div class="tt-name">${found.type}: ${found.name}</div>` +
      found.rows.map(r=>`<div class="tt-row">${r.k}: <span>${r.v}</span></div>`).join('');
    tooltip.style.left = (e.clientX+12)+'px';
    tooltip.style.top = (e.clientY-10)+'px';
    tooltip.classList.add('show');
  } else {
    tooltip.classList.remove('show');
  }
});
canvas.addEventListener('mouseleave', () => tooltip.classList.remove('show'));

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
window.addEventListener('resize', () => { resizeCanvas(); renderCanvas(animT); });
resizeCanvas();
buildSteps();
startAnim();
</script>
